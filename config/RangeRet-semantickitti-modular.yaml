# Config format schema number
format_version: 2

###################
## Model options
model:
  name: "rangeret"
  params:
    backbone: "retnet"        # [retnet, vit]

    patch_size: [7, 7]        # size of patch
    stride: [4, 4]            # stride (1 for full overlapping, patch_size for no overlapping)
    pool: False               # average pool to extract patches

    input_dim: 5              # range image features
    base_dim: 128             # base stem dimension
    dim: 128                  # hidden stem dimension

    retnet:
      layers: 8               # number of blocks per stage
      model_dim: 128          # hidden retnet dimension
      mlp_ratio: 2            # feed forward network dimension wrt dim
      num_head: 4             # number of heads per layer
      double_v_dim: True      # double v dimension wrt hidden_size

    decoder_dim: 64           # semantic head hidden dimension
    drop: 0.3                 # drop path rate

loss:
  terms:
    - name: "cross_entropy"
      weight: 1.0
    - name: "boundary"
      weight: 1.0
    - name: "lovasz"
      weight: 1.5

postprocess:
  name: "knn"
  enabled: True
  params:
    knn: 7
    search: 7
    sigma: 1.0
    cutoff: 1.0

###################
## Dataset options
dataset:
  pc_dataset_type: "SemanticKITTI"
  collate_type: "collate_fn_default"
  ignore_label: 0
  data_config: "./config/labels/semantic-kitti.yaml"
  num_classes: 20
  max_points: 150000
  sensor:
    name: "HDL64"
    type: "spherical"
    fov_up: 3
    fov_down: -25
    img_prop:
      width: 1024
      height: 64
    img_means:
      - 12.12
      - 10.88
      - 0.23
      - -1.04
      - 0.21
    img_stds:
      - 12.32
      - 11.47
      - 6.91
      - 0.86
      - 0.16

###################
## Train params
train:
  epochs: 64
  learning_rate: 1.0e-2
  weight_decay: 0.05
  optimizer: AdamW
  batch_size: 8
  workers: 4
  epsilon_w: 0.001
  range_aug: False

  scheduler:
    name: "WarmupCosine"
    max_lr: 0.01
    total_steps: 1000
    pct_start: 0.02

  report_epoch: 1
  show_scans: False
